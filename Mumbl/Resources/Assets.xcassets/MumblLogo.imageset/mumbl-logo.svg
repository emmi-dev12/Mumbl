<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neonGlow1">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neonGlow2">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="darkBg">
      <stop offset="0%" style="stop-color:#1a0026;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a000f;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Dark background -->
  <rect width="256" height="256" fill="url(#darkBg)"/>
  
  <!-- Outer glow circle -->
  <circle cx="128" cy="128" r="115" fill="none" stroke="#FF006E" stroke-width="0.5" opacity="0.3" filter="url(#neonGlow2)"/>
  <circle cx="128" cy="128" r="105" fill="none" stroke="#FF006E" stroke-width="0.5" opacity="0.15" filter="url(#neonGlow2)"/>
  
  <!-- Main circular background -->
  <circle cx="128" cy="128" r="100" fill="#0a0e27" stroke="#FF10F0" stroke-width="2" filter="url(#neonGlow1)"/>
  
  <!-- Stylized M shape made of sound waves -->
  <g fill="none" stroke="#FF006E" stroke-width="4" stroke-linecap="round" filter="url(#neonGlow1)">
    <!-- Left wave -->
    <path d="M 70 160 Q 70 120 90 100 Q 110 80 120 90 Q 130 100 120 130" />
    <!-- Center wave -->
    <path d="M 120 90 Q 130 70 140 90 Q 150 110 140 150" />
    <!-- Right wave -->
    <path d="M 140 150 Q 150 110 160 90 Q 170 70 180 100 Q 190 120 190 160" />
  </g>
  
  <!-- Accent circles at bottom -->
  <circle cx="100" cy="180" r="8" fill="#FF006E" opacity="0.8" filter="url(#neonGlow1)"/>
  <circle cx="128" cy="190" r="8" fill="#FF10F0" opacity="0.8" filter="url(#neonGlow1)"/>
  <circle cx="156" cy="180" r="8" fill="#FF006E" opacity="0.8" filter="url(#neonGlow1)"/>
  
  <!-- Top accent line -->
  <line x1="90" y1="75" x2="166" y2="75" stroke="#FF10F0" stroke-width="3" opacity="0.6" filter="url(#neonGlow1)"/>
</svg>