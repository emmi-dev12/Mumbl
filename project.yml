name: Mumbl
options:
  bundleIdPrefix: com.mumbl
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.mumbl.Mumbl
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: YES

targets:
  Mumbl:
    type: application
    platform: macOS
    sources:
      - path: Mumbl
    info:
      path: Mumbl/Info.plist
    entitlements:
      path: Mumbl/Mumbl.entitlements
    settings:
      base:
        PRODUCT_NAME: Mumbl
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: Mumbl/Info.plist
        CODE_SIGN_ENTITLEMENTS: Mumbl/Mumbl.entitlements
    dependencies:
      - package: WhisperKit
        product: WhisperKit
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
      - package: Sparkle
        product: Sparkle

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.9.0"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.0.0"
